# EVERYTHING in this file is fictional. Where a documented-safe fake range
# exists it is used (UK 07700 900xxx / 020 7946 0xxx Ofcom drama numbers,
# US 555-01xx numbers, SSA-reserved advertising SSNs, ZZ NI prefix, the
# reserved .example TLD). Everything else is invented and guarded by the
# denylist gate (corpusgen check). Templates must reference these values via
# Jinja2 — a literal name/number in a template is a bug.

