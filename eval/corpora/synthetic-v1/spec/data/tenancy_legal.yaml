# Per-entry data for the `tenancy_legal` document set (corpus.yaml).
# Entries-style: each entry names its own `template`.
#
# Narrative consistency (kept in sync across the corpus):
#   - Tenancy: Wrenmoor Estates Ltd (landlord, signatory Marcus Wrenmoor) /
#     persona, agent Penfold & Reach (44 Chandlers Row — same address as in
#     the EICR "person ordering" block), ref PR/RED/1207. Term 1 Aug 2025 –
#     31 Jul 2026, rent £1,600 pcm (the figure the notes corpus quotes),
#     deposit £1,850 held by Tenancy Deposit Safeguard under scheme ref
#     SG-25-4471820 — all matching the deposit_scheme_certificate entry in
#     letters.yaml.
#   - Employment: Halewick Systems offer — salary £58,000 (matches the
#     payslip series), start 4 Aug 2025, payroll ref HAL/2214, signed by
#     Elena Vasquez-Reid. Job title matches the CV (education_certs.yaml).
#   - Referencing: annual rent £19,200 (12 × £1,600); income £58,000 =
#     3.0× annual rent, so no guarantor was required — hence the
#     guarantor_deed entry is actually the rent-guarantee insurance
#     certificate issued to the landlord after referencing (deliberate
#     filename/content mismatch, a realistic corpus wart).
#   - Inventory check-in electricity reading 31,844 matches the opening
#     reading of the first Harwood Energy bill (energy_bills.yaml).
entries:
  - id: tenancy_agreement
    template: legal/tenancy_agreement.html
    vendor_key: letting_agency
    agreement_date: "25 July 2025"
    term_start: "1 August 2025"
    term_end: "31 July 2026"
    rent: "1,600.00"
    rent_words: "one thousand six hundred pounds"
    deposit: "1,850.00"
    scheme_ref: "SG-25-4471820"
    protected_date: "8 August 2025"
    landlord_office: "Suite 4, 18 Copperbeam Lane, London SE3 7RN"
    agent_address: "44 Chandlers Row, London SE10 9TF"
    agent_client_sort: "82-44-19"
    agent_client_account: "44771902"
    template_version: "AST v11.42s"
    esign_service: "signfolio.example"
# Signatory names are not repeated here: the template takes them from
    # person.full_name and supporting_cast.landlord_signatory (persona rule).
    tenant_signature:
      date_agreed: "25 July 2025 at 18:22 BST"
      ip: "203.0.113.87"
      reference: "SF-9c41d2ae-77b0-4e19-b2a4-115f08d22c71"
    landlord_signature:
      date_agreed: "25 July 2025 at 09:04 BST"
      ip: "198.51.100.24"
      reference: "SF-4b17f0c3-2d88-4aa1-9c02-88ea11f4b510"
    special_conditions:
      - title: "Professional cleaning"
        text: >-
          The Premises were professionally cleaned before the start of the
          Term as recorded in the Inventory. The Tenant agrees to return the
          Premises cleaned to the same professional standard at the end of
          the Term, fair wear and tear excepted, and to provide a receipt on
          request where a cleaning contractor is used.
      - title: "No smoking"
        text: >-
          The Tenant agrees not to smoke, and not to permit any visitor to
          smoke, tobacco or any other substance (including electronic
          cigarettes producing visible vapour) inside the Premises.
      - title: "Pets"
        text: >-
          No pet may be kept at the Premises without the prior written
          consent of the Landlord, such consent not to be unreasonably
          refused or delayed. Any consent may be conditional on additional
          cleaning obligations at the end of the Term.
      - title: "Working from home"
        text: >-
          The Tenant may use one room of the Premises for ordinary desk-based
          home working, provided this use remains ancillary to residential
          use, creates no business rates liability, and involves no visits
          from customers or employees.
    inventory_summary:
      - {room: "Hallway", condition: "Good decorative order; oak-effect laminate flooring, no marks recorded"}
      - {room: "Living room", condition: "Good; two-seat sofa (grey), dining table and two chairs, minor scuff to skirting behind door"}
