# Entry data for the quotes_invoices set (corpus.yaml: quotes_invoices).
# Singles, not a series, so each entry names its own template; none of these
# vendors is a recurring persona vendor, so vendor identity (all fictional)
# is baked into each template's brand block and `vendor_key` is null.
# mattress_invoice (docx) is deferred to the docx-builder pass.
#
# The two heat pump quotes are the competing-quote golden pair: same job
# (replace the flat's gas combi with an air source heat pump, June 2026 —
# prompted by the Harwood Heating safety advisory earlier that month),
# different vendors, totals, line items and tone. Arithmetic: line items sum
# to totals; VAT zero-rated on the heat pump installs, 20% on the
# electrician's works, included-in-price on retail furniture.
template: null # per-entry `template`
vendor_key: null # fictional one-off vendors, identity in-template
entries:
  - id: heatpump-quote-aurellon
    template: quotes/heatpump_quote_a.html
    quote_ref: "AR-Q-8827"
    quote_date: "22 June 2026"
    survey_date: "16 June 2026"
    designer: "Maya Brenchley"
    valid_until: "21 August 2026"
    unit_model: "Caldera Aero 6 monobloc"
    design_output: "5.8 kW at −2 °C"
    cylinder: "Caldera 180 L slimline cylinder"
    heat_loss: "4.9 kW (room-by-room)"
    scop: "4.1"
    radiator_changes: "3 radiators upsized"
