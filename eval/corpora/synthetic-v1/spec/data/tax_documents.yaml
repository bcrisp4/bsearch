      strapline: "Global mobility and expatriate tax, for people who move."
      address: "12 Exchange Vane, 30th Floor, New York, NY 10165"
      phone: "(212) 555-0188"
      email: "expat.team@rowanmere-tax.example"
      ein: "83-6602917"
      ptin: "P44108276"
    skyline_art: |2-
          _   _     __      _        _   ___
         | |_| |  _|  |_  _| |_    _| |_| _ |_   _
       __|     |_|      ||     |__|     |   | |_| |___
    pages:
      - kind: cover

      - kind: letter
        show_address: true
        signoff: false
        content:
          - p: >-
              Dear @FIRST@,
          - p: >-
              We are pleased to enclose your 2025 United States tax return
              package. This package contains the returns we have prepared on
              behalf of Meridian Loft Inc. for your final US tax year: your
              2025 federal income tax return, your 2025 New York State
              resident-period return, your foreign bank account report
              (FBAR), and the related e-filing consents. Please review each
              document, sign where indicated, and return the consents to us
              within 14 days.
          - p: >-
              Your package includes the following returns and reports:
          - bullets:
              - "2025 Federal Income Tax Return (Form 1040 with schedules and statements)"
              - "2025 Report of Foreign Bank and Financial Accounts (FBAR, Form 114)"
              - "2025 New York State return (Form IT-201 with Form IT-2)"
              - "2025 Tax Settlement Calculation (sent separately)"
          - h: "Form 8938 — Statement of Specified Foreign Financial Assets"
          - p: >-
              Because you held financial accounts outside the United States
              during 2025, Form 8938 is included with your federal return in
              addition to the FBAR. The two filings have different thresholds
              and are both required; the account values reported on each have
              been reconciled to the statements you provided.

      - kind: letter
        show_address: false
        signoff: true
        content:
          - h: "Correspondence from tax authorities"
          - p: >-
              Now that you have left the United States, any correspondence
              about these returns may be mailed to your UK address. Please
              send us a copy of any notice you receive before responding; in
              our experience the majority of post-departure notices concern
              address changes or refund cheques and are resolved with a
              single letter.
          - h: "E-file consent"
          - p: >-
              We cannot transmit your returns until we hold your signed
              e-file signature authorizations (federal Form 8879, FBAR Form
              114a, and New York Form TR-579-IT). These are in the Filing
              Instructions and Consents section of this package. Sign and
              return all three together.
          - h: "Refunds"
          - p: >-
              Your federal return shows a refund of $2,829 and your New York
              return a combined State and City refund of $302. As your US
              bank accounts are now closed, both refunds will be issued as
              cheques to your UK address. Allow up to twelve weeks after
              acceptance.
          - h: "Your feedback"
          - p: >-
              You will shortly receive a short survey about this year's
              process. Your assignment programme is billed to Meridian Loft
              Inc.; the survey takes two minutes and directly shapes the
              service.

      - kind: checklist
        title: "Required Action Checklist"
        groups:
          - heading: "E-filing consents — return within 14 days"
            items:
              - "Sign the federal e-file signature authorization (Form 8879)."
              - "Sign the FBAR e-file authorization (Form 114a) so we may transmit your foreign account report."
              - "Sign the New York e-file signature authorization (Form TR-579-IT)."
          - heading: "Tax settlement"
            items:
              - "Review the 2025 Tax Settlement Letter (sent separately) and pay $2,650 to Meridian Loft Inc. within 30 days of receiving your federal refund."
          - heading: "For your records"
            items:
              - "Keep this package with your P60 and payslips — your UK Self Assessment return reports the same UK employment income."
              - "Notify us if any refund cheque has not arrived within twelve weeks."

      - kind: divider
        title: "Filing Instructions & Consents"

      - kind: instructions
