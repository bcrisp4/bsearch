# Tax documents cluster (corpus.yaml: tax_documents). Templates under
# templates/tax/. vendor_key null throughout: employer/bank values come from
# persona employers/banks; the preparer firm (Rowanmere Tax Advisors LLP) is
# fictional and invented here.
#
# Consistency web (all figures chain — do not edit one in isolation):
#   * W-2 2024 boxes == paystub-2024-12-31 YTDs (us_paystubs.yaml, 24 pays).
#   * W-2 2025 boxes == 11 semi-monthly pays (final pay 06/15/2025); the
#     05/30/2025 stub YTDs are exactly one period smaller.
#   * Binder (tax year 2025): wages 42,845 (W-2 2025 box 1) + 33,232 UK wages
#     (Aug–Dec 2025 payslips: £26,166.65 gross at 1.27 USD/GBP); federal
#     withholding 6,732 = W-2 2025 box 2; UK tax for Form 1116 = £4,746.65
#     PAYE (payslips Aug–Dec) at 1.27 = 6,028.
#   * Tax maths: 76,624 income − 15,000 std deduction = 61,624 taxable;
#     tax 8,471 (1,192.50 + 4,386.00 + 2,892.78 rounded); FTC limited to
#     8,471 × 33,232/61,624 = 4,568 (carryover 1,460); net 3,903; refund
#     6,732 − 3,903 = 2,829. NY: withheld 2,508 (W-2 box 17), liability
#     2,206, refund 302.
#   * Settlement letter: 2,829 + 302 − 2,650 = 481; hypothetical column:
#     43,242 income, 28,242 taxable, tax 3,151, withholding 5,801,
#     overpayment 2,650.
#   * P60s == March/July payslip YTDs (uk_payslips.yaml); P60 2026/27 is the
#     full-year continuation of the same monthly figures (12 × 4,591.66 pay,
#     12 × 787.33 tax).
#   * SA returns: employment boxes == P60s; student loan 378 == the
#     student-finance letters (letters.yaml).
#   * Schedule B / SA interest figures: bank_certificates.yaml did not exist
#     when this file was authored — the amounts (84 / 313 US, £118.42 UK
#     2025-26, £204.11 2026-27) are the intended anchors for it. If the
#     certificates land with different figures, reconcile here.
