              - {label: "Total payments", amount: "$6,732"}
          - label: "Overpayment"
            highlight: true
            rows:
              - {label: "Overpayment to be refunded to you", amount: "$2,829"}
          - label: "File Your Return By"
            highlight: true
            text: >-
              June 15, 2026. As a taxpayer whose tax home is outside the
              United States on the regular due date, you receive an automatic
              two-month extension. Your return will be filed electronically —
              do not mail a paper copy.
          - label: "Special Instructions"
            text: >-
              Sign and return Form 8879 to this office. Do not sign or mail
              the return copy itself; it is watermarked for your records.

      - kind: instructions
        title: "Filing Instructions — 2025 New York State Return"
