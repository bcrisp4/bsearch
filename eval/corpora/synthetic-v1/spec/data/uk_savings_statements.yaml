# Per-issue data for the Ferrand Instant Saver quarterly statement series
# (4 issues, corpus.yaml: uk_savings_statements), Aug 2025 - Jul 2026.
# Deposits mirror the transfers out of the current account
# (uk_current_statements.yaml): 2,000.00 on 11 Aug 2025, 150.00 standing
# order on the 2nd of each month, 400.00 top-up on 9 Dec 2025. Interest
# accrues daily (gross 3.92%/AER 4.00% to 28 Feb 2026, gross 3.67%/AER
# 3.75% from 1 Mar 2026) and is credited on quarter ends; the two credits
# inside tax year 2025-26 (31 Oct + 31 Jan) sum to the gross figure on
# the certificate of interest in bank_certificates.yaml.
template: statements/uk_savings_statement.html
vendor_key: null
issues:
  - id: ferrand-saver-2025-10
    sheet: "01"
    statement_date: "31 October 2025"
    period: "11 August 2025 to 31 October 2025"
    previous_balance: "0.00"
    paid_in: "2,319.06"
    withdrawn: "0.00"
    new_balance: "2,319.06"
    interest_paid: "19.06"
    gross_rate: "3.92"
    aer: "4.00"
    notice:
      title: "Welcome to your Instant Saver"
      body:
        - >-
          Interest on your Instant Saver is calculated daily on your balance
          and paid into the account on the last day of each statement quarter.
          Your rate is 3.92% gross / 4.00% AER (variable). AER stands for
          Annual Equivalent Rate: it shows what the rate would be if interest
          were paid and compounded once each year, so you can compare accounts
          fairly.
    transactions:
      - {date: "11 Aug 25", desc: "Transfer from Ferrand current account 00918274", money_out: "", money_in: "2,000.00", balance: "2,000.00"}
      - {date: "02 Sep 25", desc: "Transfer from Ferrand current account 00918274", money_out: "", money_in: "150.00", balance: "2,150.00"}
      - {date: "02 Oct 25", desc: "Transfer from Ferrand current account 00918274", money_out: "", money_in: "150.00", balance: "2,300.00"}
      - {date: "31 Oct 25", desc: "Interest paid — gross", money_out: "", money_in: "19.06", balance: "2,319.06"}
  - id: ferrand-saver-2026-01
    sheet: "02"
    statement_date: "31 January 2026"
    period: "1 November 2025 to 31 January 2026"
    previous_balance: "2,319.06"
    paid_in: "878.15"
    withdrawn: "0.00"
    new_balance: "3,197.21"
    interest_paid: "28.15"
    gross_rate: "3.92"
    aer: "4.00"
    notice:
      title: "Your interest rate is changing on 1 March 2026"
      body:
        - >-
          Following changes in the Bank Rate, the Instant Saver rate falls
          from 3.92% gross / 4.00% AER (variable) to 3.67% gross / 3.75% AER
          (variable) on 1 March 2026. Interest earned up to that date is
          unaffected. You can withdraw at any time without notice or penalty.
    transactions:
      - {date: "03 Nov 25", desc: "Transfer from Ferrand current account 00918274", money_out: "", money_in: "150.00", balance: "2,469.06"}
      - {date: "02 Dec 25", desc: "Transfer from Ferrand current account 00918274", money_out: "", money_in: "150.00", balance: "2,619.06"}
      - {date: "09 Dec 25", desc: "Transfer from Ferrand current account 00918274", money_out: "", money_in: "400.00", balance: "3,019.06"}
      - {date: "02 Jan 26", desc: "Transfer from Ferrand current account 00918274", money_out: "", money_in: "150.00", balance: "3,169.06"}
      - {date: "31 Jan 26", desc: "Interest paid — gross", money_out: "", money_in: "28.15", balance: "3,197.21"}
  - id: ferrand-saver-2026-04
    sheet: "03"
    statement_date: "30 April 2026"
    period: "1 February 2026 to 30 April 2026"
    previous_balance: "3,197.21"
    paid_in: "481.92"
    withdrawn: "0.00"
    new_balance: "3,679.13"
    interest_paid: "31.92"
    gross_rate: "3.67"
    aer: "3.75"
    notice:
      title: "Your certificate of interest is ready"
      body:
        - >-
          Your certificate of interest for the tax year ending 5 April 2026 is
          now available to download from Ferrand Online Banking. It shows the
          gross interest we paid you during the tax year — you may need it if
          you complete a tax return. Interest is paid without tax deducted.
    transactions:
      - {date: "02 Feb 26", desc: "Transfer from Ferrand current account 00918274", money_out: "", money_in: "150.00", balance: "3,347.21"}
      - {date: "02 Mar 26", desc: "Transfer from Ferrand current account 00918274", money_out: "", money_in: "150.00", balance: "3,497.21"}
      - {date: "02 Apr 26", desc: "Transfer from Ferrand current account 00918274", money_out: "", money_in: "150.00", balance: "3,647.21"}
      - {date: "30 Apr 26", desc: "Interest paid — gross", money_out: "", money_in: "31.92", balance: "3,679.13"}
  - id: ferrand-saver-2026-07
    sheet: "04"
    statement_date: "31 July 2026"
    period: "1 May 2026 to 31 July 2026"
    previous_balance: "3,679.13"
    paid_in: "486.72"
    withdrawn: "0.00"
    new_balance: "4,165.85"
    interest_paid: "36.72"
    gross_rate: "3.67"
    aer: "3.75"
    notice:
      title: "Saving for something bigger?"
      body:
        - >-
          If you can put money away for a fixed period, our Fixed Rate Saver
          pays a higher rate than the Instant Saver in exchange for no
          withdrawals during the term. Compare current rates at
          ferrandbank.example/savings — you can open one in the app in a few
          minutes.
    transactions:
      - {date: "05 May 26", desc: "Transfer from Ferrand current account 00918274", money_out: "", money_in: "150.00", balance: "3,829.13"}
      - {date: "02 Jun 26", desc: "Transfer from Ferrand current account 00918274", money_out: "", money_in: "150.00", balance: "3,979.13"}
      - {date: "02 Jul 26", desc: "Transfer from Ferrand current account 00918274", money_out: "", money_in: "150.00", balance: "4,129.13"}
      - {date: "31 Jul 26", desc: "Interest paid — gross", money_out: "", money_in: "36.72", balance: "4,165.85"}
