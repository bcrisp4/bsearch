    notice:
      title: "About your engineer visit charge"
      body:
        - >-
          Our engineer visited on 21 January 2026 to repair the fault you
          reported on 18 January (no connection, hub light flashing red).
          The engineer traced the fault to a damaged internal socket
          faceplate, replaced it, and retested the line at full speed
          before leaving.
        - >-
          Because the fault was with wiring inside your home rather than on
          the Loopfibre network, the visit is chargeable at our standard
          rate of £65, which appears on this bill as a one-off charge. If
          you believe this charge is wrong, contact us within 30 days.
    did_you_know: >-
      Most "no connection" problems fix themselves with a 30-second hub
      restart — but if the hub light is flashing red after a restart,
      that's when to report a fault.
