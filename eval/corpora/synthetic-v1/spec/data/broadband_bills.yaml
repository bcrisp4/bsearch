# Per-issue data for the Loopfibre monthly broadband bill series (12 issues,
# corpus.yaml: broadband_bills), Sep 2025 – Aug 2026. Bills are issued on the
# 1st covering the month ahead; Direct Debit collects on the 14th. Prose
# variation: `did_you_know` rotates every issue; `notice` carries the specials
# — mid-contract price rise letter panel (Mar + Apr, effective 1 May), one-off
# engineer visit charge (Feb bill, golden target: £65 fault-repair visit on
# 21 January), router upgrade offer (Jun). Price rise: Loop Fibre 150
# £29.99 → £32.99 from 1 May 2026. All amounts include VAT at 20%.
