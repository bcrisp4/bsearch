  - id: cv
    template: education/cv.html
    about: >-
      Platform and network engineer with ten years across ISP, hosting and
      product environments in the UK and US. I like boring, reliable
      infrastructure: small blast radii, well-understood failure modes and
      automation that a whole team can operate. Recently returned to London
      after two years running reliability engineering for a New York
      property-tech scale-up.
    skills:
