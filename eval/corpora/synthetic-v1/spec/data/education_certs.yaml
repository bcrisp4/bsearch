      - {name: "Platform engineering", detail: "container orchestration, infrastructure as code, CI/CD pipelines, secrets management"}
      - {name: "Cloud and virtualisation", detail: "public IaaS, private virtualisation clusters, object storage, cost management"}
      - {name: "Observability and reliability", detail: "SLOs and error budgets, metrics/tracing/log pipelines, incident command, postmortems"}
      - {name: "Languages and tooling", detail: "Python, Go, Bash; configuration management; version control and code review workflows"}
      - {name: "Operating systems", detail: "server-grade open-source OS administration, kernel tuning, hardening baselines"}
    experience:
      - dates: "Aug 2025 – present"
        employer: "Halewick Systems Ltd"
        location: "London, UK"
        role: "Senior Platform Engineer"
        bullets:
          - "Own the internal developer platform serving 14 product teams; cut median deploy time from 41 to 9 minutes."
          - "Led the migration of build infrastructure to ephemeral runners, halving monthly compute spend."
          - "Introduced a golden-path service template adopted by every new service since October 2025."
          - "Share a five-person on-call rota; wrote the incident-command runbook now used org-wide."
      - dates: "Sep 2023 – Jun 2025"
        employer: "Meridian Loft Inc."
        location: "New York, USA"
        role: "Senior Site Reliability Engineer"
        bullets:
          - "Defined and rolled out SLOs for the booking pipeline; sustained 99.95% availability across 2024."
          - "Re-architected the edge tier across two regions, removing the single point of failure behind three 2023 outages."
          - "Moved all remaining hand-built infrastructure into code review — 100% of production changes peer-reviewed by mid-2024."
          - "Mentored four engineers; ran the weekly reliability review."
      - dates: "May 2019 – Aug 2023"
        employer: "Quillhaven Hosting Ltd"
        location: "Winchester, UK"
        role: "Systems Engineer, then DevOps Engineer (2021)"
        bullets:
          - "Automated provisioning for a 400-host managed-hosting estate; rebuild time fell from days to under an hour."
          - "Built the monitoring and alerting stack that replaced three legacy tools; on-call pages dropped 60%."
          - "Ran the customer-facing status platform and led the incident communications process."
      - dates: "Jul 2015 – Apr 2019"
        employer: "Tarnbeck Networks Ltd"
        location: "Southampton, UK"
        role: "Network Engineer"
        bullets:
