# Per-entry data for the `education_certs` document set (corpus.yaml).
# Entries-style: each entry names its own `template`. University entries use
# vendor_key: university (University of Wexcombe, persona.yaml); the trade
# certificates (EPC, EICR), tickets and course certificates carry their own
# invented incidental issuer fields per CONVENTIONS.md.
#
# Narrative consistency:
#   - Degree arc: offer letter (Mar 2012, entry Sep 2012) → transcript
#     (board 8 Jul 2015, award average 65.7%) → diploma (conferred
#     22 Jul 2015, Upper Second-Class Honours). Marks add up: level
#     averages are credit-weighted means of the module marks; the award
#     average is 30% level 5 + 70% level 6 (65.0*0.3 + 66.0*0.7 = 65.7).
#   - CV mirrors persona timeline: Wexcombe 2012–15 → Tarnbeck Networks
#     2015–19 → Quillhaven Hosting 2019–23 → Meridian Loft (NY) 2023–25 →
#     Halewick Systems 2025–. Course certificates appear on the CV.
#   - EPC (11 Jul 2025, rating C) and EICR (15 Jul 2025, satisfactory) are
#     the pre-tenancy compliance pack for Flat 12 Redecombe House, ordered
#     by Penfold & Reach for Wrenmoor Estates — mirrored in the tenancy
#     agreement (tenancy_legal.yaml) clause on EPC/electrical safety.
#   - Conference invoice sits in the US era (Nov 2024, employer Meridian
#     Loft); museum e-ticket is UK current era (May 2026).
# The grade_calculation xlsx entry in corpus.yaml is deliberately absent —
# xlsx builders are a later pass.
