# Per-issue data for the Commonwealth Harbor Bank High-Yield Savings
# quarterly statement series (3 issues, corpus.yaml:
# us_savings_statements), Oct 2024 - Jun 2025. Deposits are the
# 400.00/month transfers from checking; interest accrues daily (4.30%
# APY to 11 Mar 2025, 3.95% APY after) and is credited monthly. The 2025
# interest credits (Jan-Jun, plus a final accrual at the July 2025
# account closure) are what the savings 1042-S in bank_certificates.yaml
# reports.
template: statements/us_savings_statement.html
vendor_key: null
issues:
  - id: harbor-savings-2024-q4
    statement_date: "December 31, 2024"
    period: "October 1, 2024 through December 31, 2024"
    beginning_balance: "6,500.00"
    deposits_additions: "1,279.06"
    withdrawals_subtractions: "0.00"
    ending_balance: "7,779.06"
    apy_earned: "4.30"
    interest_period: "79.06"
    interest_ytd: "79.06"
    average_daily_balance: "7,295.74"
    notice:
      title: "How your interest works"
      body:
        - >-
          Interest on Harbor High-Yield Savings is calculated on your daily
          balance and credited on the last day of each month. The Annual
          Percentage Yield (APY) assumes interest remains on deposit;
          withdrawals will reduce earnings. Your rate is variable and may
          change after the account is opened.
    transactions:
      - {date: "10/03", desc: "Online Transfer from Checking account ending 7209", deposits: "400.00", withdrawals: "", balance: "6,900.00"}
      - {date: "10/31", desc: "Interest Payment", deposits: "25.10", withdrawals: "", balance: "6,925.10"}
      - {date: "11/04", desc: "Online Transfer from Checking account ending 7209", deposits: "400.00", withdrawals: "", balance: "7,325.10"}
      - {date: "11/30", desc: "Interest Payment", deposits: "25.75", withdrawals: "", balance: "7,350.85"}
      - {date: "12/03", desc: "Online Transfer from Checking account ending 7209", deposits: "400.00", withdrawals: "", balance: "7,750.85"}
      - {date: "12/31", desc: "Interest Payment", deposits: "28.21", withdrawals: "", balance: "7,779.06"}
