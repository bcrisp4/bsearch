# Per-entry data for the `letters` document set (corpus.yaml). Entries-style:
# each entry names its own `template` (several templates share this file) and,
# where the sender is a persona vendor, a `vendor_key` resolved from
# persona.yaml `vendors`. Entries without a vendor_key use persona context
# directly (banks.*, supporting_cast.*) and their templates never reference
# `vendor`. The docx entries (bank_address_confirmation_letter,
# agency_renewal_letter) are deliberately absent — docx builders are a later
# pass.
#
# Narrative consistency (kept in sync across entries):
#   - Sinus arc: US clinical notes (Oct 2024 / Jan 2025, Riverside) → GP
#     referral (Jan 2026) → hospital appointment (Mar 2026, Southmere Park,
#     Mr Alastair Penhaligon).
#   - Student loan arc: interest letter (Aug 2025, 4.3%→4.6%) → repayment
#     letter (Feb 2026, £54/month from Sep 2025) → annual statement
#     (Jun 2026, rates and 7 × £54 repayments match both).
#   - Move-in arc: tenancy start 1 Aug 2025 (deposit certificate, council
#     tax account), bank account opened 4 Aug 2025, visitor parking from
#     1 Oct 2025.
entries:
  - id: gp_referral_letter
    template: letters/gp_referral_letter.html
    vendor_key: gp_uk
    letter_date: "14 January 2026"
    our_ref: "PR/TM/ENT-0114"
    practice_id: "CP 88412"
    recipient:
      salutation: "Mr Penhaligon"
      name: "Mr Alastair Penhaligon"
      dept: "Ear, Nose & Throat Department"
      hospital: "Southmere Park Hospital"
      address: "Lakeview Road, London SE28 8WD"

  - id: gp_test_results_letter
    scan: true
    template: letters/gp_test_results_letter.html
    vendor_key: gp_uk
    letter_date: "20 October 2025"
    sample_date: "13 October 2025"
    results:
      - {test: "Full blood count", result: "Normal", range: "—", flag: "Normal"}
      - {test: "HbA1c", result: "34 mmol/mol", range: "20–41 mmol/mol", flag: "Normal"}
      - {test: "Total cholesterol", result: "4.6 mmol/L", range: "below 5.0 mmol/L", flag: "Normal"}
      - {test: "Ferritin", result: "88 µg/L", range: "30–400 µg/L", flag: "Normal"}
      - {test: "Vitamin D (25-hydroxy)", result: "42 nmol/L", range: "50–120 nmol/L", flag: "Borderline low"}

  - id: hospital_appointment_letter
