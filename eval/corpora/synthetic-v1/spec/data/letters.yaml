  - id: us_clinical_note_visit1
    template: letters/us_clinical_note.html
    vendor_key: hospital_us
    visit_date: "October 14, 2024"
    visit_type: "New Patient Office Visit"
    signed: "10/14/2024 4:32 PM"
    pcp: "Dana Kellerman, MD"
    referring: "Dana Kellerman, MD"
    reasons:
      - "Nasal obstruction, left greater than right"
      - "Recurrent sinus infections"
    chief_complaint: >-
      I get three or four sinus infections a year and my left nostril is
      pretty much always blocked, especially at night.
    hpi:
      - >-
        30 y.o. male, new patient, referred by PCP for evaluation of
        recurrent rhinosinusitis. Reports 3-4 episodes per year x several
        years with facial pressure, purulent drainage, and congestion, most
        responding to antibiotics. Baseline left-sided nasal obstruction,
        worse supine, with mouth breathing and snoring reported by partner.
      - >-
        Denies epistaxis, anosmia, facial trauma as an adult. Recalls a
        soccer injury to the nose in his teens, not treated. OTC oxymetazoline
        used intermittently, no more than 3 days at a time. No prior sinus
        imaging. No prior nasal surgery.
    symptoms:
      - {name: "Nasal congestion", answer: "Yes"}
      - {name: "Facial pain or pressure", answer: "Yes"}
      - {name: "Post-nasal drainage", answer: "Yes"}
      - {name: "Decreased sense of smell", answer: "No"}
      - {name: "Nosebleeds", answer: "No"}
      - {name: "Snoring", answer: "Yes"}
      - {name: "Ear pain or fullness", answer: "No"}
      - {name: "Hearing loss", answer: "No"}
      - {name: "Hoarseness", answer: "No"}
      - {name: "Nighttime mouth breathing", answer: "Yes"}
    allergies: "No known drug allergies on file"
    medications:
      - "fluticasone propionate (generic) 50 mcg/actuation nasal spray — 2 sprays each nostril daily; Disp: 16 g; Rfl: 3 — STARTED THIS VISIT"
      - "oxymetazoline 0.05% nasal spray — patient-directed OTC use, counseled to limit to 3 consecutive days"
    vitals:
      - {label: "BP", value: "118/74"}
      - {label: "Pulse", value: "66"}
      - {label: "Height", value: "5' 11\" (180.3 cm)"}
      - {label: "Weight", value: "172 lb (78 kg)"}
      - {label: "BMI", value: "24.0"}
    exam:
      - {region: "General", findings: "Well-appearing, no acute distress. Voice normal."}
      - {region: "Ears", findings: "EACs clear bilaterally; TMs intact with normal light reflex."}
      - region: "Nose/anterior rhinoscopy"
        findings: >-
          Caudal septum deviated to the LEFT with near-contact of the left
          inferior turbinate; bilateral inferior turbinate hypertrophy,
          mucosa boggy without polyps. No purulence at middle meatus today.
      - region: "Nasal endoscopy (diagnostic, in-office)"
        findings: >-
          Confirms leftward septal deviation with a posterior septal spur;
          middle meatus patent bilaterally; nasopharynx clear, no mass.
      - {region: "Oral cavity/oropharynx", findings: "Moist mucosa, no lesions; tonsils 1+, symmetric."}
      - {region: "Neck", findings: "No lymphadenopathy, no thyromegaly."}
    assessment:
      - {title: "Deviated nasal septum (leftward, with posterior spur)", note: "likely post-traumatic, symptomatic"}
      - {title: "Recurrent acute rhinosinusitis", note: "3-4 episodes/year by history"}
      - {title: "Inferior turbinate hypertrophy, bilateral", note: "contributing to obstruction"}
    plan:
      - >-
        Start intranasal fluticasone daily, both nostrils, with technique
        counseling; continue for a minimum of 8 weeks before assessing
        benefit. Add daily large-volume saline irrigation.
      - >-
        Discontinue habitual decongestant spray use; discussed rebound
        congestion risk.
      - >-
        If symptoms persist on maximal medical therapy, obtain non-contrast
        sinus CT and discuss septoplasty with inferior turbinate reduction.
        Surgical anatomy and expectations reviewed in general terms today.
      - >-
        Patient education: sleep-position measures, humidification in
        winter months.
    follow_up: "Return to clinic in 3 months to reassess on medical therapy, sooner if a sinus infection develops."

  - id: us_clinical_note_visit2
    template: letters/us_clinical_note.html
    vendor_key: hospital_us
    visit_date: "January 21, 2025"
    visit_type: "Established Patient Office Visit — Follow-up"
    signed: "01/21/2025 11:05 AM"
    pcp: "Dana Kellerman, MD"
    referring: "Dana Kellerman, MD"
    reasons:
      - "Follow-up: septal deviation and recurrent rhinosinusitis, on medical therapy"
    chief_complaint: >-
      The spray and rinses are helping — I can breathe through the left side
      most nights now. One mild infection over the holidays but it cleared
      on its own.
    hpi:
      - >-
        30 y.o. male returns for planned 3-month follow-up of leftward
        septal deviation with posterior spur and bilateral inferior
        turbinate hypertrophy documented on endoscopy at his initial visit
        on 10/14/2024. Since starting daily intranasal fluticasone and
        saline irrigation he reports meaningful improvement: left-sided
        obstruction now intermittent rather than constant, snoring reduced
        per partner, nighttime mouth breathing largely resolved.
      - >-
        One URI-associated sinus episode in late December, milder than
        prior episodes, resolved without antibiotics in about a week.
        Compliant with sprays; has stopped OTC decongestant entirely.
    symptoms:
      - {name: "Nasal congestion", answer: "Yes — improved, intermittent"}
      - {name: "Facial pain or pressure", answer: "No"}
      - {name: "Post-nasal drainage", answer: "Occasional"}
      - {name: "Decreased sense of smell", answer: "No"}
      - {name: "Nosebleeds", answer: "No — minor crusting only"}
      - {name: "Snoring", answer: "Improved"}
    allergies: "No known drug allergies on file"
    medications:
      - "fluticasone propionate (generic) 50 mcg/actuation nasal spray — 2 sprays each nostril daily; Disp: 16 g; Rfl: 3 — CONTINUED"
      - "saline nasal irrigation, large volume — daily, CONTINUED"
    vitals:
      - {label: "BP", value: "121/76"}
      - {label: "Pulse", value: "70"}
      - {label: "Weight", value: "171 lb (77.6 kg)"}
      - {label: "BMI", value: "23.8"}
    exam:
      - {region: "General", findings: "Well-appearing, no acute distress."}
      - region: "Nose/anterior rhinoscopy"
        findings: >-
          Septal deviation to the LEFT unchanged, as expected; turbinate
          mucosa notably less edematous than at the 10/14/2024 visit.
          Improved left-sided airflow on inspection. No purulence, no
          significant crusting.
      - {region: "Oral cavity/oropharynx", findings: "Unremarkable."}
    assessment:
      - {title: "Deviated nasal septum (leftward, with posterior spur)", note: "anatomically unchanged; symptoms improving on medical therapy"}
      - {title: "Recurrent acute rhinosinusitis", note: "one mild self-limited episode since last visit — improved trajectory"}
      - {title: "Inferior turbinate hypertrophy, bilateral", note: "reduced mucosal edema on today's exam"}
    plan:
      - >-
        Continue intranasal fluticasone and daily saline irrigation; good
        symptomatic response, so no imaging indicated at this time.
      - >-
        Deferred septoplasty: given mild residual symptoms and improvement
        on medical therapy, patient elects to continue conservative
        management. Revisit surgical discussion if obstruction worsens or
        infection frequency rebounds.
      - >-
        Counseled that anatomic deviation will not change with medication;
        symptom control is the treatment goal.
    follow_up: "Return as needed; recommend re-evaluation if more than two sinus infections in the next 12 months. Records available to patient via portal for overseas relocation."

