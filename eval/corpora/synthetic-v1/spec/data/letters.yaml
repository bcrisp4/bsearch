          overdraft, borrowing will cost slightly less.
      - title: "Same-day CHAPS payments will cost less"
        body: >-
          The fee for sending a same-day CHAPS payment from a branch falls
          from £25 to £15. CHAPS payments made through the app remain £12.
      - title: "Free text alerts are switching on for everyone"
        body: >-
          From the effective date we will automatically send you a text
          alert when your balance falls below £50 or an unpaid transaction
          fee is about to apply. You can change or turn off alerts in the
          app at any time.
      - title: "New payees will need app approval"
        body: >-
          When you set up a payment to someone new using telephone banking,
          you will be asked to approve it in the Ferrand Mobile app before
          it is sent. This protects you if someone impersonates you on the
          phone.
      - title: "Cheques will clear faster"
        body: >-
          Cheques paid in at a branch or by post will be available by
          11.59pm on the next working day, in line with cheques paid in
          through the app.

