# uk_payslips). Three-panel UK payroll-software layout. GENERATED by a
# helper script (arithmetic chained; do not hand-edit numbers):
#   salary 58,000/yr = 4,833.33/mo; pension 5% employee + 5% employer
#   (net pay arrangement - reduces Gross for Tax, not NIable pay);
#   simplified month-1 PAYE: free pay = allowance/12 (1257L -> 1,047.50;
#   1263L from Apr 2026 -> 1,052.50), 20% to 3,141.67/mo then 40%;
#   employee NI 8% between 1,048 and 4,189 then 2%; employer NI 15%
#   over 417. Dec 2025 = 2,000 bonus month.
# Student loan Plan 1: nil in Aug, then 54.00/mo from Sep 2025 - exactly
# seven deductions (378.00) fall in tax year 2025/26, matching the
# student-finance statement and repayment letters in letters.yaml.
# YTD columns accumulate within the tax year and reset at April 2026.
# vendor_key null: employer values come from persona employers.uk_current.
