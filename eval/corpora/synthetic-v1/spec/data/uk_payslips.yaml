# CANON: net pay equals the Halewick Systems salary credits in
# uk_current_statements.yaml to the penny - 1,405.72 (partial August,
# started 18 Aug), 2,379.86 (Sep 2025 - Mar 2026), 2,439.78 (Apr - Jul
# 2026 after a pay rise and the 1257L -> 1263L code change). Model:
# notional salary 3,129.47/mo (3,227.32 from April) with a 5% pension
# salary exchange, so PAYE/NI are computed on 2,973.00 (3,065.95); tax
# 20% over free pay (allowance/12), NI 8% over 1,047.50, Student Loan
# Plan 1 = 9% over 2,372.50/mo floored to whole pounds = 54 (62 from
# April). The December 2,000.00 bonus is exchanged in full into the
# pension, so December net matches the statements.
# Student loan: nil in August, then 54.00/mo from Sep 2025 - exactly
# seven deductions (378.00) fall in tax year 2025/26, matching the
# student-finance letters in letters.yaml. YTD columns accumulate within
# the tax year and reset at April 2026.
# vendor_key null: employer values come from persona employers.uk_current.
