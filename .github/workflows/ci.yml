name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded in-flight runs for the same PR. Never cancel on main: two
# commits landing close together would leave the first with no completed run,
# which the badge reports and required checks would block on.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: grant nothing by default; each job opts in to what it needs.
permissions: {}

# bsearch is cgo (SQLite driver with sqlite-vec statically linked), so nothing
# here cross-compiles and every job runs on macos-latest — an arm64 macOS
# runner, the same platform bsearch targets. Linting on ubuntu would silently
# skip every `//go:build darwin` file (FSEvents, launchd, power state), which is
# where the macOS-specific risk lives.
env:
  CGO_ENABLED: "1"

jobs:
  test:
    name: test
    runs-on: macos-latest
    # macOS runners are the scarcest tier; don't let a hung cgo call or a
    # deadlocked daemon test hold one for the default six hours.
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          # go.mod pins `toolchain go1.26.5`, so the build uses the patched
          # stdlib regardless of what setup-go pre-installs. check-latest fetches
          # the newest matching patch; the toolchain directive is the repro anchor.
          go-version-file: go.mod
          check-latest: true
          # Keys the built-in module+build cache. Both files are listed: a
          # dependency-free module has no go.sum, and setup-go only fails when
          # *no* listed path resolves — so this picks go.sum up automatically
          # once dependencies land. Compiling sqlite-vec + SQLite from C is the
          # slow part of a cold build.
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Unit tests (race + shuffle + coverage)
        run: |
          go test -race -shuffle=on -timeout=300s \
            -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        # always(), so a failing suite still reports what it managed to cover —
        # but a compile error means no coverage.out at all, and this step must
        # not add a second red step on top of the real failure.
        if: always()
        run: |
          {
            echo '### Coverage'
            echo '```'
            if [ -f coverage.out ]; then
              go tool cover -func=coverage.out | tail -n 1
            else
              echo '(no coverage data)'
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build (prove the cgo/sqlite-vec link)
        run: go build -trimpath -o /dev/null ./cmd/bsearch

  lint:
    name: lint
    runs-on: macos-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: |
            go.mod
            go.sum

      # Installs the tool versions pinned in mise.toml, so CI and a local
      # `make lint` run the identical linter — no second version to keep in
      # sync in this file.
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7 # mise itself; the tools it installs come from mise.toml

      # golangci-lint v2 dropped the `github-actions` output format and does not
      # auto-annotate, so findings would otherwise only appear in the raw log.
      # This matcher turns its `file:line:col: message` output into inline PR
      # annotations — the one thing golangci-lint-action gave us for free.
      - name: Register golangci-lint problem matcher
        run: echo "::add-matcher::.github/golangci-lint-matcher.json"

      # Both steps go through the Makefile so there is one definition of what
      # linting means — a flag added locally can't drift out of CI.
      # golangci-lint v2 covers formatting (gofumpt/goimports) and `go vet`,
      # so there are no separate gofmt/vet steps.
      - name: golangci-lint
        run: make lint

      # Scoped to the lint step: govulncheck's output would otherwise be
      # matched too, annotating unrelated lines.
      - name: Deregister problem matcher
        if: always()
        run: echo "::remove-matcher owner=golangci-lint::"

      - name: govulncheck
        # Run with the repo's toolchain, so the stdlib report reflects the
        # toolchain we actually ship with. Text output exits non-zero on a
        # reachable vulnerability, failing the job.
        run: make vulncheck

      - name: go mod tidy is clean
        run: |
          go mod tidy
          # `--` so the pathspec is safe when go.sum doesn't exist yet; the
          # porcelain check catches a newly-created (untracked) go.sum too.
          git diff --exit-code -- go.mod go.sum
          test -z "$(git status --porcelain -- go.mod go.sum)"
